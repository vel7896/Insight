<div class="upload-container">
  <div class="upload-header">
    <h1>Upload Data</h1>
    <p>Upload your datasets to begin analyzing with AI.</p>
  </div>

  <div 
    class="drop-zone"
    [class.dragging]="isDragging"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
    (click)="fileInput.click()"
  >
    <div class="drop-zone-content">
      <div class="upload-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
      </div>
      <h2>Click or drag and drop to upload</h2>
      <p>Support for CSV, XLSX, and JSON files</p>
      <input 
        type="file" 
        #fileInput 
        (change)="onFileSelected($event)" 
        hidden 
        multiple
        accept=".csv,.xlsx,.json"
      >
    </div>
  </div>

  <div class="upload-list" *ngIf="(uploads$ | async)?.length">
    <div class="list-header">
      <h3>Recent Uploads</h3>
      <button (click)="clearUploads()" class="clear-btn">Clear All</button>
    </div>

    <div class="upload-items">
      <div 
        class="upload-item" 
        *ngFor="let upload of uploads$ | async"
        [class.success]="upload.status === 'success'"
      >
        <div class="item-info">
          <div class="file-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <div class="file-details">
            <span class="file-name">{{ upload.fileName }}</span>
            <span class="file-status">{{ upload.status }}</span>
          </div>
          <div class="upload-success-icon" *ngIf="upload.status === 'success'">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00d084" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
        </div>
        <div class="progress-container">
          <div class="progress-bar" [style.width.%]="upload.progress"></div>
        </div>
      </div>
    </div>
  </div>
</div>
